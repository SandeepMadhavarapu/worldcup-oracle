<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline | WorldCup Oracle</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #07100d;
        color: #f4f4f5;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        text-align: center;
        padding: 24px;
      }
      .card {
        max-width: 420px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        padding: 32px;
        background: rgba(255, 255, 255, 0.04);
      }
      h1 { font-size: 1.4rem; margin: 0 0 12px; }
      p { color: #a1a1aa; line-height: 1.6; margin: 0; font-size: 0.95rem; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You're offline</h1>
      <p>
        WorldCup Oracle needs a connection for live pages that aren't cached yet.
        Reconnect and try again — previously visited pages may still work.
      </p>
    </div>
  </body>
</html>
