name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Generate Next.js env types
        run: |
          printf '/// <reference types="next" />\n/// <reference types="next/image-types/global" />\n' > next-env.d.ts

      - name: Typecheck
        run: npm run typecheck

      - name: Test with coverage thresholds
        run: npm run coverage

      - name: Build
        run: npm run build

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build (intro disabled for deterministic E2E)
        run: npm run build
        env:
          NEXT_PUBLIC_ENABLE_INTRO: "false"

      - name: Run E2E tests
        run: npm run e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
